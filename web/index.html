<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <title>Love Pop Up</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg" aria-hidden="true">
      <div class="blob b1"></div>
      <div class="blob b2"></div>
      <div class="blob b3"></div>
      <div class="noise"></div>
    </div>

    <header class="topbar">
      <div class="brand">
        <div class="mark" aria-hidden="true">❤</div>
        <div class="brandText">
          <div class="brandTitle">Love Pop Up</div>
          <div class="brandSub">心形弹窗 · 轻盈 · 治愈</div>
        </div>
      </div>

      <div class="actions">
        <button class="btn" id="btnReview" type="button">大家在说啥</button>
        <button class="btn primary" id="btnStart" type="button">开始</button>
        <button class="btn" id="btnClear" type="button">清空</button>
      </div>
    </header>

    <main class="stage" aria-label="弹窗舞台">
      <div class="hud">
        <div class="chip" id="chipStatus">就绪</div>
        <div class="chip">
          <span class="kbd">ESC</span>
          <span class="sep">·</span>
          停止并清空
        </div>
        <div class="chip">
          点击任意弹窗
          <span class="sep">·</span>
          关闭它
        </div>
      </div>
      <div id="layer" class="layer" role="presentation"></div>

      <section class="panel" id="settingsPanel" aria-label="设置">
        <button class="panelTitle" id="togglePanel" type="button">
          <span>设置</span>
          <span class="panelChevron" aria-hidden="true">⌄</span>
        </button>
        <div class="grid">
          <label class="field">
            <div class="label">排列图形</div>
            <select id="shapeType">
              <option value="heart" selected>爱心</option>
              <option value="star5">五角星</option>
              <option value="star6">六芒星</option>
            </select>
          </label>
          <label class="field">
            <div class="label">图形大小倍率</div>
            <input id="sizeScale" type="number" min="0.5" max="3" step="0.1" value="1.0" />
          </label>
          <label class="field">
            <div class="label">图形顶点数量</div>
            <input id="countHeart" type="number" min="1" max="600" step="1" value="180" />
          </label>
          <label class="field">
            <div class="label">随机数量</div>
            <input id="countRandom" type="number" min="0" max="600" step="1" value="160" />
          </label>
          <label class="field">
            <div class="label">速度 (ms)</div>
            <input id="intervalMs" type="number" min="10" max="200" step="1" value="25" />
          </label>
          <label class="field">
            <div class="label">自动消失 (ms)</div>
            <input id="ttlMs" type="number" min="0" max="20000" step="100" value="0" />
          </label>
          <label class="field" style="grid-column: 1 / -1;">
            <div class="label">自定义文案 (每行一条，不填使用默认)</div>
            <textarea id="customMessages" rows="3" placeholder="例如：
祝你天天开心
事事顺心"></textarea>
          </label>
        </div>
      </section>
    </main>

    <footer class="footer">
      <span>Made for you</span>
      <span class="dot">·</span>
      <span>基于原 Tkinter 弹窗逻辑复刻为 Web 动效</span>
    </footer>

    <div class="modal" id="surveyModal" role="dialog" aria-modal="true" aria-labelledby="surveyTitle" hidden>
      <div class="modalCard">
        <div class="modalHeader">
          <div>
            <div class="modalTitle" id="surveyTitle">进入前填写一下小信息</div>
            <div class="modalSub">用于用户调查与分析（可不填联系方式）</div>
          </div>
          <div class="modalMark" aria-hidden="true">❤</div>
        </div>

        <form id="surveyForm" class="modalForm">
          <div class="modalGrid">
            <label class="mField">
              <div class="mLabel">昵称</div>
              <input id="surveyName" required maxlength="80" placeholder="怎么称呼你" />
            </label>

            <label class="mField">
              <div class="mLabel">年龄段</div>
              <select id="surveyAge" required>
                <option value="" selected disabled>请选择</option>
                <option value="≤18">≤18</option>
                <option value="19-24">19-24</option>
                <option value="25-30">25-30</option>
                <option value="31-40">31-40</option>
                <option value="41+">41+</option>
              </select>
            </label>

            <label class="mField">
              <div class="mLabel">性别</div>
              <select id="surveyGender" required>
                <option value="" selected disabled>请选择</option>
                <option value="女">女</option>
                <option value="男">男</option>
                <option value="其他/不便透露">其他/不便透露</option>
              </select>
            </label>

            <label class="mField">
              <div class="mLabel">城市</div>
              <input id="surveyCity" maxlength="80" placeholder="例如：深圳" />
            </label>

            <label class="mField">
              <div class="mLabel">职业</div>
              <input id="surveyOcc" maxlength="80" placeholder="例如：学生 / 产品 / 设计" />
            </label>

            <label class="mField">
              <div class="mLabel">来这里想做什么</div>
              <select id="surveyPurpose">
                <option value="放松一下" selected>放松一下</option>
                <option value="找灵感">找灵感</option>
                <option value="做测试/学习">做测试/学习</option>
                <option value="其他">其他</option>
              </select>
            </label>
          </div>

          <label class="mField">
            <div class="mLabel">想对我说的话</div>
            <textarea id="surveyFeedback" maxlength="2000" placeholder="例如：希望增加更多特效/配色/文案…"></textarea>
          </label>

          <label class="mField">
            <div class="mLabel">联系方式（可选）</div>
            <input id="surveyContact" maxlength="120" placeholder="微信/QQ/邮箱（可不填）" />
          </label>

          <label class="mCheck">
            <input id="surveyConsent" type="checkbox" required />
            <span>我同意提交以上信息用于调查与分析</span>
          </label>

          <div class="modalActions">
            <button class="btn primary" id="surveySubmit" type="submit">提交并进入</button>
          </div>

          <div class="modalHint" id="surveyHint"></div>
        </form>
      </div>
    </div>

    <div class="modal" id="reviewsModal" role="dialog" hidden>
      <div class="modalCard">
        <div class="modalHeader">
          <div>
            <div class="modalTitle">大家在说啥</div>
            <div class="modalSub">快来分享你的体验</div>
          </div>
          <button type="button" class="popupClose" id="closeReviews" style="position:static;">×</button>
        </div>

        <div class="reviewsLayout">
          <div class="reviewsList" id="reviewsList">
            <!-- 评论列表将通过 JS 动态生成 -->
            <div style="text-align:center; padding: 20px; color: gray;">加载中...</div>
          </div>

          <form id="reviewForm" class="modalForm" style="border-top: 1px solid rgba(0,0,0,0.08); margin-top: 12px; padding-top: 16px;">
            <div class="mLabel">打个分吧</div>
            <div class="starRating" id="starRating">
              <span data-val="1">★</span><span data-val="2">★</span><span data-val="3">★</span><span data-val="4">★</span><span data-val="5" class="active">★</span>
            </div>
            <input type="hidden" id="reviewScore" value="5" />

            <label class="mField" style="margin-top: 8px;">
              <div class="mLabel">昵称</div>
              <input id="reviewName" placeholder="你的昵称" maxlength="80" required />
            </label>

            <label class="mField" style="margin-top: 8px;">
              <div class="mLabel">评论内容</div>
              <textarea id="reviewComment" placeholder="写下你的使用体验..." maxlength="2000" style="min-height:60px;" required></textarea>
            </label>

            <div class="modalActions" style="margin-top: 12px;">
              <button class="btn primary" type="submit" id="reviewSubmit">提交评价</button>
            </div>
            <div id="reviewHint" class="modalHint"></div>
          </form>
        </div>
      </div>
    </div>

    <script>
      window.__LOVEPOP_API_BASE__ = "https://one-love-pop-up-window.onrender.com/";
    </script>
    <script src="./app.js"></script>
  </body>
</html>
